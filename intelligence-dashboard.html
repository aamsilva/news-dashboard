<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>YouTube Intelligence Dashboard - 2026-04-09</title>
<style>
body { font-family: system-ui; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
h1 { color: #58a6ff; }
.stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
.stat { background: #161b22; padding: 20px; border-radius: 8px; text-align: center; min-width: 150px; border: 1px solid #30363d; }
.stat-value { font-size: 2em; color: #58a6ff; font-weight: bold; }
.stat-label { color: #8b949e; font-size: 0.9em; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; position: relative; border-left: 4px solid #30363d; }
.card.high { border-left-color: #3fb950; }
.card.medium { border-left-color: #d29922; }
.card.low { border-left-color: #484f58; }
.card-score { position: absolute; top: 8px; right: 12px; font-size: 1.5em; font-weight: bold; color: var(--score-color, #3fb950); }
.card-channel { color: #8b949e; font-size: 0.85em; }
.card-topics { color: #58a6ff; font-size: 0.85em; margin-top: 8px; }
.card-meta { color: #484f58; font-size: 0.8em; margin-top: 8px; }
.card-link { color: #58a6ff; text-decoration: none; font-size: 0.9em; }
.card-link:hover { text-decoration: underline; }
.filter { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; }
</style></head><body>
<h1>📺 YouTube Intelligence Dashboard — 2026-04-09</h1>
<div class="stats">
    <div class="stat"><div class="stat-value">0</div><div class="stat-label">Videos Analyzed</div></div>
    <div class="stat"><div class="stat-value">0</div><div class="stat-label">High Signal (≥7)</div></div>
    <div class="stat"><div class="stat-value">0</div><div class="stat-label">Active Channels</div></div>
    <div class="stat"><div class="stat-value">0</div><div class="stat-label">Total Words</div></div>
</div>
<input class="filter" type="text" id="search" placeholder="Search videos..." onkeyup="doFilter()">
<div class="grid" id="grid">

</div>
<script>
function doFilter() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
        c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
</body></html>
