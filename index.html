<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Intelligence Hub</title>
<style>
body{font-family:Inter,sans-serif;background:#0a0e17;color:#f9fafb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0;padding:20px;text-align:center;}
h1{font-size:2.5rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;}
p{color:#9ca3af;font-size:1.2rem;margin-bottom:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:800px;width:100%;}
.card{background:#1a1f2e;border:1px solid #374151;border-radius:14px;padding:30px;text-decoration:none;color:inherit;transition:all .3s;}
.card:hover{transform:translateY(-4px);border-color:#3b82f6;}
.card h2{font-size:1.3rem;margin-bottom:10px;}
.card span{color:#9ca3af;font-size:.9rem;}
</style>
</head>
<body>
<h1>🤖 Hermes Intelligence Hub</h1>
<p>Choose your dashboard</p>
<div class="grid">
<a class="card" href="catalog.html">
<h2>📺 Video Catalog</h2>
<span>726 videos • Filters • Search</span>
</a>
<a class="card" href="https://aamsilva.github.io/news-dashboard/">
<h2>📊 Live Dashboard</h2>
<span>Real-time news • YouTube insights</span>
</a>
</div>
</body>
</html>
